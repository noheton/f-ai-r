name: Build and deploy site

on:
  push:
    branches: ["main", "claude/**"]
    paths:
      - "doc/**"
      - "agents/**"
      - "site/**"
      - "scripts/build_provenance_site.py"
      - "scripts/requirements.txt"
      - ".github/workflows/pages.yml"
      - "README.md"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    # Validate the Turtle and render the site on every push. Working
    # branches see the build output as a downloadable artefact. Pages-
    # specific steps (configure-pages, upload-pages-artifact) run only
    # when the workflow ref is main, so a working-branch push does not
    # fail when GitHub Pages is not yet configured for the repository.
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: scripts/requirements.txt

      - name: Install Python deps
        run: pip install -r scripts/requirements.txt

      - name: Validate provenance.ttl
        run: |
          python -c "from rdflib import Graph; g=Graph(); g.parse('doc/provenance.ttl', format='turtle'); print(f'OK: {len(g)} triples')"

      - name: Build static site
        run: python scripts/build_provenance_site.py

      - name: Upload site as workflow artefact (every branch)
        uses: actions/upload-artifact@v4
        with:
          name: site-${{ github.sha }}
          path: _site
          retention-days: 14

      - name: Configure Pages
        if: github.ref == 'refs/heads/main'
        uses: actions/configure-pages@v5

      - name: Upload Pages artefact
        if: github.ref == 'refs/heads/main'
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    if: github.ref == 'refs/heads/main'
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

name: Build

on:
  push:
    branches: ["**"]
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: false

jobs:
  changes:
    name: Detect changed paths
    runs-on: ubuntu-latest
    outputs:
      paper: ${{ steps.filter.outputs.paper }}
      slides: ${{ steps.filter.outputs.slides }}
      site: ${{ steps.filter.outputs.site }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Filter changed paths
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            paper:
              - 'paper/**'
              - 'doc/provenance.ttl'
              - 'scripts/provenance_analysis.py'
              - 'scripts/build_reading_queue.py'
              - 'scripts/requirements.txt'
              - '.github/workflows/build.yml'
            slides:
              - 'slides/**'
              - 'paper/figures/**'
              - '.github/workflows/build.yml'
            site:
              - 'doc/**'
              - 'agents/**'
              - 'site/**'
              - 'scripts/build_provenance_site.py'
              - 'scripts/requirements.txt'
              - 'README.md'
              - '.github/workflows/build.yml'

  paper:
    name: Build paper
    needs: changes
    if: needs.changes.outputs.paper == 'true' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python (for provenance-analysis fragment generator)
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: scripts/requirements.txt

      - name: Install Python deps
        run: pip install -r scripts/requirements.txt

      - name: Regenerate provenance-analysis fragments
        run: python scripts/provenance_analysis.py

      - name: Regenerate reading-queue
        run: python scripts/build_reading_queue.py

      # We don't fail the workflow on latexmk's exit code: a residual
      # ``Missing $`` warning emitted by biblatex during the
      # bibliography-rendering pass causes pdflatex to return non-zero
      # even though the PDF is written. The next step asserts the PDF
      # exists and is non-empty, which is the real success criterion.
      - name: Compile main.tex
        id: compile
        continue-on-error: true
        uses: xu-cheng/latex-action@v3
        with:
          working_directory: paper
          root_file: main.tex
          extra_system_packages: ""
          args: -pdf -interaction=nonstopmode

      - name: Show LaTeX log on failure
        if: steps.compile.outcome != 'success'
        working-directory: paper
        run: |
          echo "::group::main.log (last 200 lines)"
          tail -n 200 main.log || echo "(no main.log)"
          echo "::endgroup::"

      - name: Assert main.pdf exists
        working-directory: paper
        run: |
          if [ ! -s main.pdf ]; then
            echo "ERROR: paper/main.pdf is missing or empty"
            exit 1
          fi
          if command -v pdfinfo >/dev/null 2>&1; then
            pdfinfo main.pdf | awk '/^Pages:/ {print "PDF pages: " $2}'
          fi

      - name: Upload PDF as workflow artefact
        uses: actions/upload-artifact@v4
        with:
          name: paper-pdf-${{ github.sha }}
          path: paper/main.pdf
          if-no-files-found: error
          retention-days: 30

      # On main, publish the freshly-built PDF as a rolling
      # 'latest-draft' GitHub Release so the README and the site can
      # link a stable, current download URL without rerunning CI.
      # The PDF carries a "DRAFT --- not yet peer-reviewed" watermark
      # via paper/style/fair2r.sty (\faiarDraft=true), which is the
      # default until a published version is explicitly authorised.
      - name: Publish draft PDF to 'latest-draft' release
        if: github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest-draft
          name: "F(AI)²R --- latest draft PDF"
          body: |
            Auto-built from commit ${{ github.sha }}.
            Carries a DRAFT watermark; not yet peer-reviewed.
            Site: https://noheton.github.io/f-ai-r/
          files: paper/main.pdf
          prerelease: true
          make_latest: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  slides:
    name: Build slides
    needs: changes
    if: needs.changes.outputs.slides == 'true' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      # Stage the paper PNG figures into slides/ so the poster's
      # \includegraphics calls resolve regardless of the
      # latex-action container's path-traversal policy. The
      # poster's \graphicspath also tries ../paper/figures/ as a
      # fallback for local builds.
      - name: Stage figures for the poster
        run: |
          set -e
          cp -v paper/figures/hero.png slides/ 2>&1 || true
          cp -v paper/figures/ladder-populations.png slides/ 2>&1 || true
          cp -v paper/figures/provenance-topology.png slides/ 2>&1 || true
          cp -v paper/figures/contribution-histogram.png slides/ 2>&1 || true
          ls -la slides/*.png || true

      - name: Compile pitch deck
        id: pitch
        uses: xu-cheng/latex-action@v3
        with:
          working_directory: slides
          root_file: pitch-5min.tex
          args: -pdf -interaction=nonstopmode -file-line-error
          continue_on_error: true

      - name: Dump pitch log on failure
        if: steps.pitch.outcome == 'failure'
        run: |
          echo "::group::pitch-5min.log (tail)"
          tail -120 slides/pitch-5min.log || true
          echo "::endgroup::"

      - name: Compile conference deck
        id: conf
        uses: xu-cheng/latex-action@v3
        with:
          working_directory: slides
          root_file: conference-30min.tex
          args: -pdf -interaction=nonstopmode -file-line-error
          continue_on_error: true

      - name: Dump conference log on failure
        if: steps.conf.outcome == 'failure'
        run: |
          echo "::group::conference-30min.log (tail)"
          tail -200 slides/conference-30min.log || true
          echo "::endgroup::"

      - name: Compile poster
        id: poster
        uses: xu-cheng/latex-action@v3
        with:
          working_directory: slides
          root_file: poster-A0.tex
          args: -pdf -interaction=nonstopmode -file-line-error
          extra_system_packages: "py3-pygments"
          continue_on_error: true

      - name: Dump poster log on failure
        if: steps.poster.outcome == 'failure'
        run: |
          echo "::group::poster-A0.log (full)"
          cat slides/poster-A0.log || echo "(no log file)"
          echo "::endgroup::"
          echo "::group::slides/ contents"
          ls -la slides/ || true
          echo "::endgroup::"

      - name: Upload poster log as artefact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: poster-log-${{ github.sha }}
          path: |
            slides/poster-A0.log
            slides/poster-A0.aux
          if-no-files-found: warn
          retention-days: 14

      - name: Upload decks + poster as workflow artefact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: slides-${{ github.sha }}
          path: |
            slides/pitch-5min.pdf
            slides/conference-30min.pdf
            slides/poster-A0.pdf
          if-no-files-found: warn
          retention-days: 30

      - name: Publish rendered decks + poster to 'latest-draft-slides' release
        if: always() && github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest-draft-slides
          name: "F(AI)²R --- latest draft slide decks + poster"
          body: |
            Auto-built from commit ${{ github.sha }}.
            Pitch deck (5 min), conference deck (25+5 min), and
            A0 conference poster. Beamer + DLR Corporate Design
            (slides/style/fair2r-beamer.sty); poster via tikzposter.
            DRAFT until publication consent is recorded.
            Site: https://noheton.github.io/f-ai-r/
          files: |
            slides/pitch-5min.pdf
            slides/conference-30min.pdf
            slides/poster-A0.pdf
          fail_on_unmatched_files: false
          prerelease: true
          make_latest: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Fail the job if any artefact failed
        if: steps.pitch.outcome == 'failure' || steps.conf.outcome == 'failure' || steps.poster.outcome == 'failure'
        run: |
          echo "Pitch outcome:      ${{ steps.pitch.outcome }}"
          echo "Conference outcome: ${{ steps.conf.outcome }}"
          echo "Poster outcome:     ${{ steps.poster.outcome }}"
          exit 1

  site:
    name: Build site
    needs: changes
    if: needs.changes.outputs.site == 'true' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: scripts/requirements.txt

      - name: Install Python deps
        run: pip install -r scripts/requirements.txt

      - name: Validate provenance.ttl
        run: |
          python -c "from rdflib import Graph; g=Graph(); g.parse('doc/provenance.ttl', format='turtle'); print(f'OK: {len(g)} triples')"

      - name: Build static site
        run: python scripts/build_provenance_site.py

      - name: Upload site as workflow artefact (every branch)
        uses: actions/upload-artifact@v4
        with:
          name: site-${{ github.sha }}
          path: _site
          retention-days: 14

      - name: Configure Pages
        if: github.ref == 'refs/heads/main'
        uses: actions/configure-pages@v5

      - name: Upload Pages artefact
        if: github.ref == 'refs/heads/main'
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    name: Deploy site to GitHub Pages
    if: github.ref == 'refs/heads/main'
    needs: site
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

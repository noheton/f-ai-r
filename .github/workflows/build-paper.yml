name: Build paper

on:
  push:
    branches: ["**"]
  workflow_dispatch:

permissions:
  contents: write   # write so the main-branch build can update the
                    # 'latest-draft' release that hosts the draft PDF

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python (for provenance-analysis fragment generator)
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: scripts/requirements.txt

      - name: Install Python deps
        run: pip install -r scripts/requirements.txt

      - name: Regenerate provenance-analysis fragments
        run: python scripts/provenance_analysis.py

      - name: Regenerate reading-queue
        run: python scripts/build_reading_queue.py

      # Compile main.tex with latexmk. We don't fail the workflow on
      # latexmk's exit code: a residual ``Missing $`` warning emitted
      # by biblatex during the bibliography-rendering pass causes
      # pdflatex to return non-zero even though the PDF is written.
      # The next step asserts the PDF exists and is non-empty, which
      # is the real success criterion.
      - name: Compile main.tex
        id: compile
        continue-on-error: true
        uses: xu-cheng/latex-action@v3
        with:
          working_directory: paper
          root_file: main.tex
          extra_system_packages: ""
          args: -pdf -interaction=nonstopmode

      - name: Show LaTeX log on failure
        if: steps.compile.outcome != 'success'
        working-directory: paper
        run: |
          echo "::group::main.log (last 200 lines)"
          tail -n 200 main.log || echo "(no main.log)"
          echo "::endgroup::"

      - name: Assert main.pdf exists
        working-directory: paper
        run: |
          if [ ! -s main.pdf ]; then
            echo "ERROR: paper/main.pdf is missing or empty"
            exit 1
          fi
          if command -v pdfinfo >/dev/null 2>&1; then
            pdfinfo main.pdf | awk '/^Pages:/ {print "PDF pages: " $2}'
          fi

      - name: Upload PDF as workflow artefact
        uses: actions/upload-artifact@v4
        with:
          name: paper-pdf-${{ github.sha }}
          path: paper/main.pdf
          if-no-files-found: error
          retention-days: 30

      # On main, publish the freshly-built PDF as a rolling
      # 'latest-draft' GitHub Release so the README and the site can
      # link a stable, current download URL without rerunning CI.
      # The PDF carries a "DRAFT --- not yet peer-reviewed" watermark
      # via paper/style/fair2r.sty (\faiarDraft=true), which is the
      # default until a published version is explicitly authorised.
      - name: Publish draft PDF to 'latest-draft' release
        if: github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest-draft
          name: "F(AI)²R --- latest draft PDF"
          body: |
            Auto-built from commit ${{ github.sha }}.
            Carries a DRAFT watermark; not yet peer-reviewed.
            Site: https://noheton.github.io/f-ai-r/
          files: paper/main.pdf
          prerelease: true
          make_latest: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

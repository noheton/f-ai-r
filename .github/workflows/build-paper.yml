name: Build paper

on:
  push:
    branches: ["**"]
    paths:
      - "paper/**"
      - ".github/workflows/build-paper.yml"
  pull_request:
    paths:
      - "paper/**"
      - ".github/workflows/build-paper.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Compile main.tex
        uses: xu-cheng/latex-action@v3
        with:
          working_directory: paper
          root_file: main.tex
          args: -pdf -interaction=nonstopmode -halt-on-error -file-line-error

      - name: Report page count
        working-directory: paper
        run: |
          if command -v pdfinfo >/dev/null 2>&1; then
            pdfinfo main.pdf | awk '/^Pages:/ {print "PDF pages: " $2}'
          else
            echo "pdfinfo not available in container; skipping."
          fi

      - name: Upload PDF
        uses: actions/upload-artifact@v4
        with:
          name: paper-pdf-${{ github.sha }}
          path: paper/main.pdf
          if-no-files-found: error
          retention-days: 30

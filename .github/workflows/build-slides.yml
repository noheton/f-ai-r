name: Build slides

on:
  push:
    branches: ["**"]
    paths:
      - "slides/**"
      - ".github/workflows/build-slides.yml"
  pull_request:
    paths:
      - "slides/**"
      - ".github/workflows/build-slides.yml"
  workflow_dispatch:

permissions:
  contents: write   # write so the main-branch build can update the
                    # 'latest-draft-slides' release that hosts the rendered
                    # decks for direct download (mirrors the paper PDF flow).

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Compile pitch deck
        id: pitch
        uses: xu-cheng/latex-action@v3
        with:
          working_directory: slides
          root_file: pitch-5min.tex
          args: -pdf -interaction=nonstopmode -file-line-error
          continue_on_error: true

      - name: Dump pitch log on failure
        if: steps.pitch.outcome == 'failure'
        run: |
          echo "::group::pitch-5min.log (tail)"
          tail -120 slides/pitch-5min.log || true
          echo "::endgroup::"

      - name: Compile conference deck
        id: conf
        uses: xu-cheng/latex-action@v3
        with:
          working_directory: slides
          root_file: conference-30min.tex
          args: -pdf -interaction=nonstopmode -file-line-error
          continue_on_error: true

      - name: Dump conference log on failure
        if: steps.conf.outcome == 'failure'
        run: |
          echo "::group::conference-30min.log (tail)"
          tail -200 slides/conference-30min.log || true
          echo "::endgroup::"

      - name: Compile poster
        id: poster
        uses: xu-cheng/latex-action@v3
        with:
          working_directory: slides
          root_file: poster-A0.tex
          args: -pdf -interaction=nonstopmode -file-line-error
          continue_on_error: true

      - name: Dump poster log on failure
        if: steps.poster.outcome == 'failure'
        run: |
          echo "::group::poster-A0.log (tail)"
          tail -200 slides/poster-A0.log || true
          echo "::endgroup::"

      - name: Fail the job if any artefact failed
        if: steps.pitch.outcome == 'failure' || steps.conf.outcome == 'failure' || steps.poster.outcome == 'failure'
        run: |
          echo "Pitch outcome:      ${{ steps.pitch.outcome }}"
          echo "Conference outcome: ${{ steps.conf.outcome }}"
          echo "Poster outcome:     ${{ steps.poster.outcome }}"
          exit 1

      - name: Upload decks + poster as workflow artefact
        uses: actions/upload-artifact@v4
        with:
          name: slides-${{ github.sha }}
          path: |
            slides/pitch-5min.pdf
            slides/conference-30min.pdf
            slides/poster-A0.pdf
          if-no-files-found: error
          retention-days: 30

      # On main, publish the rendered decks as a rolling
      # 'latest-draft-slides' GitHub Release so the README and the
      # site can link a stable download URL without rerunning CI per
      # reader. Mirrors the paper-PDF distribution pattern.
      - name: Publish rendered decks + poster to 'latest-draft-slides' release
        if: github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest-draft-slides
          name: "F(AI)²R --- latest draft slide decks + poster"
          body: |
            Auto-built from commit ${{ github.sha }}.
            Pitch deck (5 min), conference deck (25+5 min), and
            A0 conference poster. Beamer + DLR Corporate Design
            (slides/style/fair2r-beamer.sty); poster via tikzposter.
            DRAFT until publication consent is recorded.
            Site: https://noheton.github.io/f-ai-r/
          files: |
            slides/pitch-5min.pdf
            slides/conference-30min.pdf
            slides/poster-A0.pdf
          prerelease: true
          make_latest: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
